mode = "backtest"

[data]
source = "wolfram_financial"
symbol = "SP500"
start = "2020-01-01"
end = "2023-01-01"
field = "Close"
resolution = "day"

[backtest]
starting_cash = 100000.0
window = 60
holding_period_bars = 1
log_bars = false
log_trades = true

[backtest.strategy]
kind = "flexible_pipeline_predictor"
enter_threshold = 0.0001
exit_threshold = 0.0
force_trade_each_bar = true

[[backtest.strategy.pipeline]]
name = "returns"
op = "log_returns"
window = 60

[[backtest.strategy.pipeline]]
name = "fits"
op = "fit_distributions"
input = "returns"
families = ["Normal"]
test = "KS"

[[backtest.strategy.pipeline]]
name = "prediction"
op = "aggregate"
method = "weighted_sum"
values = "fits"
weights = "fits"
