# Linear Leveraged Strategy Example
# This strategy uses the magnitude of the prediction to decide position size.
# It also allows margin (leverage > 1.0).

mode = "backtest"

[data]
source = "wolfram_financial"
symbol = "SP500"
start = "2020-01-01"
end = "2023-12-31"
resolution = "day"
field = "Close"

[backtest]
starting_cash = 100000.0
allow_margin = true # Enable leverage
window = 60
holding_period_bars = 1
log_bars = false
log_trades = true

[backtest.strategy]
kind = "flexible_pipeline_predictor"
execution_mode = "linear" # Use prediction as position multiplier
enter_threshold = 0.0     # Not used in linear mode, but required by schema
exit_threshold = 0.0      # Not used in linear mode, but required by schema
force_trade_each_bar = true

[[backtest.strategy.pipeline]]
name = "returns"
op = "log_returns"
window = 60

[[backtest.strategy.pipeline]]
name = "fits"
op = "fit_distributions"
input = "returns"
families = ["Normal", "StudentsT", "Laplace", "Logistic", "Cauchy"]
test = "KS"

[[backtest.strategy.pipeline]]
name = "raw_signal"
op = "aggregate"
method = "weighted_sum"
values = "fits"
weights = "fits"

# Scale the signal to reach meaningful leverage levels.
# E.g., if raw_signal is 0.001 (0.1%), factor=1000 makes it 1.0 (100% leverage)
[[backtest.strategy.pipeline]]
name = "prediction"
op = "scale"
input = "raw_signal"
factor = 500.0 
