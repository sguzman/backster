mode = "backtest"

[data]
source = "wolfram_expr"
expr = "TimeSeries[Table[{DatePlus[DateObject[{2020, 1, 1}], i], 100.0 + 0.2 i + 2.0 Sin[i/5.0]}, {i, 0, 120}]]"

[backtest]
starting_cash = 100000.0
window = 20
holding_period_bars = 1
log_bars = false
log_trades = true

[backtest.strategy]
kind = "flexible_pipeline_predictor"
enter_threshold = 0.001
exit_threshold = 0.0
force_trade_each_bar = true

[[backtest.strategy.pipeline]]
name = "returns"
op = "log_returns"
window = 20

[[backtest.strategy.pipeline]]
name = "fits"
op = "fit_distributions"
input = "returns"
families = ["Normal", "StudentsT", "Laplace", "Logistic", "Cauchy"]
test = "KS"

[[backtest.strategy.pipeline]]
name = "prediction"
op = "aggregate"
method = "weighted_sum"
values = "fits"
weights = "fits"
