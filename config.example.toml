mode = "backtest"

[data]
source = "wolfram_financial"
symbol = "AAPL"
start = "2020-01-01"
end = "2021-01-01"
field = "Close"
resolution = "day"

[backtest]
starting_cash = 100000.0
window = 126
trade_resolution = "bar"
holding_period_bars = 1
log_bars = true
log_trades = true

[backtest.strategy]
kind = "rolling_pvalue_predictor"
enter_threshold = 0.001
exit_threshold = 0.0
normalize_weights = true
min_total_weight = 0.0
force_trade_each_bar = false

